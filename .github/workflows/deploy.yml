name: CI/CD — Lint, Test, SecScan & GitOps

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!monitoring/**'
      - '!.github/workflows/monitoring-deploy.yml'
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Code Quality (Linting & Testing)
  # ─────────────────────────────────────────────
  quality-checks:
    name: Lint & Test Code
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cv_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Run Ruff Linter
        working-directory: ./backend
        run: ruff check .

      - name: Run Pytest
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cv_db
        run: |
          alembic upgrade head || echo "Skipped migrations"
          pytest test_main.py

  # ─────────────────────────────────────────────
  # JOB 2: Build, Scan (Trivy) & Push Images
  # ─────────────────────────────────────────────
  build-scan-push:
    name: Build, Scan & Push
    needs: quality-checks
    runs-on: ubuntu-latest
    environment: cv-devops-env
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- BACKEND ---
      - name: Build and export backend to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}'
          format: 'table'
          exit-code: '1' # Падає, якщо є CRITICAL вразливості
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Backend Image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          docker tag ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }} ${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # --- FRONTEND ---
      - name: Build and export frontend to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}'
          format: 'table'
          exit-code: '0' # Не блокуємо деплой через вразливості npm (вони завжди є)
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend Image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }} ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  # ─────────────────────────────────────────────
  # JOB 3: GitOps — Update Infra Repository
  # ─────────────────────────────────────────────
  update-infra-repo:
    name: Update K8s Manifests in Infra Repo
    runs-on: ubuntu-latest
    needs: build-scan-push # Зверни увагу: тепер чекаємо на build-scan-push!
    environment: cv-devops-env

    steps:
      - name: Checkout INFRA repository
        uses: actions/checkout@v4
        with:
          repository: 'Kavallerya/devops-cv-app-infra'
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Update image tags in Kubernetes manifests
        env:
          IMAGE_TAG: ${{ needs.build-scan-push.outputs.image_tag }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          sed -i "s|image: $DOCKER_USER/cv-backend:.*|image: $DOCKER_USER/cv-backend:$IMAGE_TAG|g" k8s/app/backend.yaml
          sed -i "s|image: $DOCKER_USER/cv-frontend:.*|image: $DOCKER_USER/cv-frontend:$IMAGE_TAG|g" k8s/app/frontend.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/app/backend.yaml k8s/app/frontend.yaml
          git commit -m "chore(gitops): update images to tag ${{ needs.build-scan-push.outputs.image_tag }}" || echo "No changes to commit"
          git push origin main