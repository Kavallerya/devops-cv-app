name: CI/CD — Build, Push & GitOps Deploy

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!monitoring/**'
      - '!.github/workflows/monitoring-deploy.yml'
      - '!k8s/**' # Додали виняток, щоб пайплайн не реагував на зміни самих маніфестів
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & push images to Docker Hub (БЕЗ ЗМІН)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    environment: cv-devops-env
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: GitOps — Update K8s Manifests 
  # ─────────────────────────────────────────────
  update-k8s-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: cv-devops-env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Стандартний токен для пушу

      - name: Update image tags in Kubernetes manifests
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # Використовуємо sed для пошуку і заміни рядка image: у файлах
          sed -i "s|image: $DOCKER_USER/cv-backend:.*|image: $DOCKER_USER/cv-backend:$IMAGE_TAG|g" k8s/backend.yaml
          sed -i "s|image: $DOCKER_USER/cv-frontend:.*|image: $DOCKER_USER/cv-frontend:$IMAGE_TAG|g" k8s/frontend.yaml

      - name: Commit and push changes
        run: |
          # Налаштовуємо "бота", від чийого імені буде зроблено коміт
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Додаємо змінені файли
          git add k8s/backend.yaml k8s/frontend.yaml
          
          # Робимо коміт з приміткою [skip ci]
          git commit -m "chore(gitops): update images to tag ${{ needs.build-and-push.outputs.image_tag }} [skip ci]" || echo "No changes to commit"
          
          # Пушимо в гілку main
          git push origin main