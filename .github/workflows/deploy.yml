name: CI/CD — Build, Push & GitOps Deploy

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!monitoring/**'
      - '!.github/workflows/monitoring-deploy.yml'
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cv-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cv-frontend

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & push images to Docker Hub (Без змін)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    environment: cv-devops-env
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: GitOps — Update Infra Repository
  # ─────────────────────────────────────────────
  update-infra-repo:
    name: Update K8s Manifests in Infra Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: cv-devops-env

    steps:
      - name: Checkout INFRA repository
        uses: actions/checkout@v4
        with:
          repository: 'Kavallerya/devops-cv-app-infra' # Клонуємо новий репозиторій
          token: ${{ secrets.INFRA_REPO_TOKEN }}       # Використовуємо ключ від бункера

      - name: Update image tags in Kubernetes manifests
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          sed -i "s|image: $DOCKER_USER/cv-backend:.*|image: $DOCKER_USER/cv-backend:$IMAGE_TAG|g" k8s/backend.yaml
          sed -i "s|image: $DOCKER_USER/cv-frontend:.*|image: $DOCKER_USER/cv-frontend:$IMAGE_TAG|g" k8s/frontend.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/backend.yaml k8s/frontend.yaml
          
          # Нам більше не потрібен [skip ci], бо в інфра-репозиторії немає пайплайнів
          git commit -m "chore(gitops): update images to tag ${{ needs.build-and-push.outputs.image_tag }}" || echo "No changes to commit"
          git push origin main